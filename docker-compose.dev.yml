# Dev overrides: backend with volume mount and --reload for hot reload.
# Use: make up-dev or docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# For frontend hot reload, run `npm run dev` in frontend/ locally and proxy API to backend.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app:ro
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://app:appsecret@db:5432/appdb}
